<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>James Vickers MCIM MCPR — Interactive Resume</title>
    <!-- Using system fonts: Helvetica Neue, Helvetica, Arial -->
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="ipod.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <!-- Sidebar Navigation -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img class="sidebar-avatar" src="assets/Main Pic/James Vickers Main Pic.jpg" alt="James Vickers" id="sidebar-photo" style="cursor:pointer" />
            <h1 class="sidebar-name">James Vickers</h1>
            <span class="sidebar-credentials">MCIM · MCPR</span>
        </div>
        <p class="sidebar-tagline">Senior Marketing Professional driving growth through high-impact strategy across cycling, fitness tech & fintech.</p>
        <div class="sidebar-divider"></div>
        <ul class="sidebar-nav">
            <li><button class="nav-btn" data-target="experience"><span class="nav-icon"><svg width="14" height="14" viewBox="0 0 14 18"><polygon points="7,1 13,9 7,17 1,9" fill="none" stroke="currentColor" stroke-width="1.5"/></svg></span> Experience <span class="nav-arrow">→</span></button></li>
            <li><button class="nav-btn" data-target="skills"><span class="nav-icon"><svg width="14" height="14" viewBox="0 0 14 14"><polygon points="7,1 13,13 1,13" fill="none" stroke="currentColor" stroke-width="1.5"/></svg></span> Skills <span class="nav-arrow">→</span></button></li>
            <li><button class="nav-btn" data-target="education"><span class="nav-icon"><svg width="14" height="14" viewBox="0 0 14 14"><circle cx="7" cy="7" r="5.5" fill="none" stroke="currentColor" stroke-width="1.5"/></svg></span> Education <span class="nav-arrow">→</span></button></li>
            <li><button class="nav-btn" data-target="about"><span class="nav-icon"><svg width="14" height="14" viewBox="0 0 18 14"><polygon points="9,1 17,7 9,13 1,7" fill="none" stroke="currentColor" stroke-width="1.5"/></svg></span> About <span class="nav-arrow">→</span></button></li>
            <li><button class="nav-btn" data-target="contact"><span class="nav-icon"><svg width="14" height="14" viewBox="0 0 18 12"><rect x="1" y="1" width="9" height="10" rx="1" fill="none" stroke="currentColor" stroke-width="1.3"/><rect x="8" y="1" width="9" height="10" rx="1" fill="none" stroke="currentColor" stroke-width="1.3"/></svg></span> Contact <span class="nav-arrow">→</span></button></li>
            <li><button class="nav-btn" data-target="ai-work"><span class="nav-icon"><svg width="14" height="14" viewBox="0 0 18 12"><circle cx="6" cy="6" r="5" fill="none" stroke="currentColor" stroke-width="1.3"/><circle cx="12" cy="6" r="5" fill="none" stroke="currentColor" stroke-width="1.3"/></svg></span> AI Work <span class="nav-arrow">→</span></button></li>
            <li><button class="nav-btn" data-target="listen"><span class="nav-icon">♪</span> Listen <span class="nav-arrow">→</span></button></li>
        </ul>
        <div class="sidebar-divider"></div>
        <div class="sidebar-footer">
            <button class="download-btn" id="downloadPdf">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1v10M8 11L4 7M8 11l4-4M2 14h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Download PDF
            </button>
            <div class="sidebar-location">
                <span class="location-dot"></span>
                Sheffield / Lincoln, UK
            </div>
        </div>
    </nav>

    <!-- Rotate device prompt -->
    <div class="rotate-prompt" id="rotatePrompt">
        <div class="rotate-prompt-content">
            <div class="rotate-icon">📱↻</div>
            <p>For the best experience, rotate your phone to landscape</p>
            <button class="rotate-dismiss" id="rotateDismiss">Continue anyway</button>
        </div>
    </div>

    <!-- Two-finger tooltip -->
    <div class="touch-tooltip" id="touchTooltip">Use two fingers to scroll and zoom</div>

    <!-- Mobile menu toggle -->
    <button class="mobile-menu-toggle" id="mobileToggle">
        <span></span><span></span><span></span>
    </button>

    <!-- Main Canvas Area -->
    <main class="canvas-area" id="canvasArea">
        <canvas id="graphCanvas"></canvas>
        <div class="nodes-container" id="nodesContainer"></div>
    </main>

    <!-- Detail Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal">
            <div class="modal-dots">
                <span class="dot dot-red" id="dotClose" title="Close"></span>
                <span class="dot dot-yellow" id="dotMinimize" title="Minimize"></span>
                <span class="dot dot-green" id="dotMaximize" title="Maximize"></span>
            </div>
            <div class="modal-content" id="modalContent"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="ipod.js"></script>
    <script src="graph.js"></script>
    <script src="app.js"></script>
</body>
</html>
